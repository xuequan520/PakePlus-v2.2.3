<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>激活验证</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Microsoft YaHei', sans-serif;
            }

            body {
                min-height: 100vh;
                background: linear-gradient(135deg, #2c3e50, #4ca1af);
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            /* 激活码卡片 */
            .card {
                background: #fff;
                width: 100%;
                max-width: 420px;
                padding: 35px 30px;
                border-radius: 16px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                text-align: center;
                transition: all 0.3s;
            }

            .card h2 {
                font-size: 22px;
                color: #333;
                margin-bottom: 10px;
            }

            .card p {
                color: #666;
                font-size: 14px;
                margin-bottom: 25px;
            }

            /* 输入框 */
            .input-box {
                width: 100%;
                padding: 14px 16px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 8px;
                outline: none;
                margin-bottom: 20px;
                text-align: center;
                letter-spacing: 1px;
            }

            .input-box:focus {
                border-color: #4ca1af;
            }

            /* 按钮 */
            .btn {
                width: 100%;
                padding: 14px;
                background: #4ca1af;
                color: #fff;
                font-size: 16px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition: background 0.2s;
            }

            .btn:hover {
                background: #3a8a99;
            }

            /* 提示文字 */
            .tip {
                margin-top: 15px;
                font-size: 13px;
                color: #e74c3c;
                display: none;
            }

            /* 激活后显示的内容 */
            .content {
                display: none;
                color: #333;
                text-align: left;
                margin-top: 20px;
            }

            .content h3 {
                margin-bottom: 10px;
                color: #2c3e50;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h2>请输入激活码</h2>
            <p>验证成功后即可访问内容</p>
            <input
                type="text"
                class="input-box"
                id="code"
                placeholder="请输入激活码"
                maxlength="20"
            />
            <button class="btn" onclick="checkCode()">立即验证</button>
            <div class="tip" id="tip">激活码错误，请重新输入</div>
            <!-- 验证成功后显示的内容 -->
            <div class="content" id="content">
                <h3>✅ 验证成功</h3>
                <p>欢迎访问，你已获得访问权限！</p>
                <br />
                <p>这里可以放你的隐私内容、下载链接、文档等。</p>
            </div>
        </div>

        <script>
            // 在这里设置你的激活码
            const RIGHT_CODE = 'admin888'

            function checkCode() {
                let code = document.getElementById('code').value.trim()
                let tip = document.getElementById('tip')
                let content = document.getElementById('content')

                if (code === RIGHT_CODE) {
                    // 验证成功
                    tip.style.display = 'none'
                    content.style.display = 'block'
                } else {
                    // 验证失败
                    tip.style.display = 'block'
                    content.style.display = 'none'
                }
            }
        </script>
    </body>
</html>
